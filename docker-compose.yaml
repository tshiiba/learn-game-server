services:
  mysql:
    image: mysql:8.4.7
    container_name: lgs-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: mysql
      MYSQL_DATABASE: db
      MYSQL_USER: user
      MYSQL_PASSWORD: password
      TZ: 'Asia/Tokyo'
    volumes:
      - lgs-mysql-data:/var/lib/mysql

  cognito-local:
    image: jagregory/cognito-local:latest
    container_name: lgs-cognito-local
    ports:
      - "9229:9229"
    volumes:
      - ./.cognito:/app/.cognito

volumes:
  lgs-mysql-data:
